kind = "api"
previewPath = "/api"
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api"]

[services.development]
run = "python /home/runner/workspace/artifacts/api-server/main.py"

[services.production]

[services.production.build]
args = ["sh", "-c", "pip install -r /home/runner/workspace/artifacts/api-server/requirements.txt -q"]

[services.production.run]
args = ["python", "/home/runner/workspace/artifacts/api-server/main.py"]

[services.production.run.env]
PORT = "8080"

[services.production.health.startup]
path = "/api/healthz"
